<html>

<head>
    <meta charset="UTF-8">
    <title>Vaev | Dev's Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="base.css" />
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="interdep.css" />
    <script src="app.js" type="module"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div id="toolbar">
        <button id="burgerBtn" aria-label="Menu">&#9776;</button>
        <a href="./index.html" class="logo">
            <img src="logo.webp" alt="Vaev">
        </a>
        <div id="viewTabs">
            <button class="tab-btn active" data-view="chart">Test Results</button>
            <button class="tab-btn" data-view="heatmap">CSS Properties</button>
        </div>
        <button id="themeToggle" aria-label="Toggle dark mode">&#9790;</button>
    </div>
    <div id="sidebarOverlay"></div>

    <div id="mainContent">
        <aside id="sidebar">
            <div class="legend" id="sidebarLegend">
                <div id="gradientLegend">
                    <span>0%</span>
                    <div class="gradient"></div>
                    <span>100%</span>
                </div>
            </div>
            <div id="reports">
                <div class="nav-item" data-report="wpt"><a class="nav-link" onclick="changeReport('wpt')">All Tests</a>
                </div>
            </div>
        </aside>

        <!-- Chart View -->
        <main id="chartArea">
            <div id="chartWrapper">
                <canvas id="myChart"></canvas>
            </div>
        </main>

        <!-- Heatmap View -->
        <div id="heatmapArea" style="display: none;">
            <div id="heatmapContainer">
                <canvas id="heatmap"></canvas>
                <div class="zoom-controls">
                    <button id="zoomIn">+</button>
                    <button id="zoomOut">−</button>
                    <button id="resetView">↺</button>
                </div>
                <span id="stats"></span>
            </div>
            <div id="controls">
                <label>
                    Search:
                    <input type="text" id="searchInput" placeholder="display, flex, width...">
                </label>
            </div>
        </div>
    </div>

    <div id="detailOverlay"></div>
    <aside id="detailPanel">
        <div id="detailHeader">
            <strong id="detailTitle"></strong>
            <button id="detailClose">&times;</button>
        </div>
        <div id="detailContent"></div>
    </aside>

    <div id="tooltip"></div>
</body>

</html>
